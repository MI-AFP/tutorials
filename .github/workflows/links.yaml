name: Check links

on:
  pull_request:
  push:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  lychee:
    name: Links in Markdown files
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Check links in Markdown files
        uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          args: >-
            --verbose
            --no-progress
            --timeout 20
            --retry-wait-time 5
            --max-retries 2
            './**/*.md'
